<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="./jquery-3.6.0.min.js"></script>
    <script>
        $(function () {
            $('p').prev().css('background', 'red'); //兄弟节点的上一个节点
            $('p').next().css('background', 'blue'); //兄弟节点的下一个节点
        })
    </script>
</head>

<body>
    <div>111</div>
    <p>
        222
        <strong>内嵌</strong>
    </p>
    <em>333</em>
</body>

</html>
