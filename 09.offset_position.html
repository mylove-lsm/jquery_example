<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        #box1 {
            width: 200px;
            height: 200px;
            margin: 30px;
            background: red;
            position: relative;
        }

        #box2 {
            width: 100px;
            height: 100px;
            margin: 20px;
            background: blue;
        }
    </style>
    <script src="./jquery-3.6.0.min.js"></script>
    <script>
        $(function() {
            // 当前元素距离页面最左的距离，该元素的margin不作为元素一部分
            let l1 = $('#box2').offset().left;
            // 当前元素距离最近一个有定位的父级元素的距离，该元素的margin作为元素的一部分，父级元素的margin不作为父级元素的一部分
            let l2 = $('#box2').position().left;
            // 查找最近的有定位的父级元素节点
            $('#box2').offsetParent().css('background', 'yellow');
            alert(`${l1}  ${l2}`);
        })
    </script>
</head>
<body>
    <div id="box1">
        <div id="box2"></div>
    </div>
</body>
</html>
