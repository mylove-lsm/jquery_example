<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="./jquery-3.6.0.min.js"></script>
    <script>
        $(function () {
            $('div').filter('.box').css('background', 'blue');
            $('div').not('.box').css('background', 'orange');
            $('div').has('.box').css('width', '500px');
        })
    </script>
</head>

<body>
    <div class="box">div1</div>
    <div>
        div2
        <strong class="box">aaa</strong>
    </div>
</body>

</html>
